version: "2"

run:
  concurrency: 4
  tests: true
  timeout: 5m

linters:
  default: none
  enable:
    - dupl
    - gochecknoinits
    - goconst
    - ineffassign
    - misspell
    - nakedret
    - unconvert
    - whitespace

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - goconst

formatters:
  enable:
    - gofumpt
    - goimports
